<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أنا آسف</title>
    <style>
        /* استدعاء خط عربي أنيق */
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            background-color: #fdf2f8; /* لون خلفية هادي ومريح */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: #333;
        }

        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 90%;
            z-index: 10;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 30px;
            color: #db2777; 
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            position: relative;
            height: 50px;
        }

        button {
            padding: 10px 30px;
            font-size: 1.2rem;
            font-family: 'Cairo', sans-serif;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.3s;
        }

        #yesBtn {
            background-color: #db2777;
            color: white;
        }

        #yesBtn:hover {
            background-color: #be185d;
            transform: scale(1.05);
        }

        #noBtn {
            background-color: #e5e7eb;
            color: #4b5563;
            position: absolute; /* عشان نقدر نحركه بحرية في الشاشة */
            transition: left 0.2s ease, top 0.2s ease;
        }

        #messagePhase {
            display: none; /* مخفي في البداية */
        }

        .message-text {
            font-size: 1.2rem;
            line-height: 1.8;
            color: #374151;
            font-weight: 600;
        }

        .heart {
            color: #db2777;
            font-size: 3rem;
            margin-bottom: 15px;
            animation: heartbeat 1.5s infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <!-- شاشة السؤال -->
        <div id="questionPhase">
            <h1>أنا آسف.. ممكن تسامحيني؟ 🥺</h1>
            <div class="buttons">
                <button id="yesBtn">أيوة طبعاً</button>
                <button id="noBtn" style="right: 55%;">لأ</button>
            </div>
        </div>

        <!-- شاشة الرسالة بعد ما تضغط أيوة -->
        <div id="messagePhase">
            <div class="heart">❤️</div>
            <div class="message-text">
                أنا بجد زعلان من نفسي جداً بسبب الموقف اللي حصل.<br>
                عارف إني ضايقتك، بس أوعدك إن اللي حصل ده مش هيتكرر تاني أبداً.<br>
                إنتي غالية عندي جداً ومقدرش على زعلك أبداً.
            </div>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const questionPhase = document.getElementById('questionPhase');
        const messagePhase = document.getElementById('messagePhase');

        // كود تحريك زرار "لا" لما الماوس ييجي عليه
        noBtn.addEventListener('mouseover', () => {
            // حساب أبعاد الشاشة عشان الزرار ميهربش براها
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 50);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 50);
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = `${Math.max(10, x)}px`;
            noBtn.style.top = `${Math.max(10, y)}px`;
            noBtn.style.right = 'auto';
        });

        // كود إظهار الرسالة لما تضغط "أيوة"
        yesBtn.addEventListener('click', () => {
            questionPhase.style.display = 'none';
            messagePhase.style.display = 'block';
        });
    </script>

</body>
</html>
